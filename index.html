<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Imran Nasiza Portfolio</title>
  <meta name="description" content="QA Engineer Portfolio" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23090909'/%3E%3Ctext x='32' y='42' font-family='Arial,sans-serif' font-size='28' font-weight='700' fill='%23ff4d00' text-anchor='middle'%3EIN%3C/text%3E%3C/svg%3E" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="cur"></div>
<div id="cur-d"></div>
<div class="noise"></div>
<canvas id="particles"></canvas>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div id="spbar"></div>

<nav class="nav" id="nav">
  <div class="wrap nav-in">
    <a href="#home" class="logo" id="logo-top">IN<span>.</span></a>
    <ul class="nav-links" id="nav-links"></ul>
    <a href="#contact" class="nav-cta">Написать</a>
    <button class="ham" id="ham" aria-label="menu"><span></span><span></span><span></span></button>
  </div>
</nav>

<div class="mob-nav" id="mob-nav"></div>

<section class="hero" id="home">
  <div class="wrap hero-in">
    <div id="hero-text">
      <h1 class="h-name" id="h-name"></h1>
      <div class="h-role" id="h-role"></div>
      <p class="h-tag" id="h-tag"></p>
      <div class="h-pills" id="h-pills"></div>
      <div class="h-btns">
        <a href="#projects" class="btn-p">Посмотреть проекты →</a>
        <a href="#contact"  class="btn-s">Написать</a>
      </div>
      <div class="h-stats" id="h-stats"></div>
    </div>
    <div class="hero-vis">
      <div class="av-wrap">
        <div class="av-pulse"></div>
        <div class="av-pulse2"></div>
        <div class="av-ring"></div>
        <div class="av-ring2"></div>
        <div class="av-body">
          <img class="av-img" id="av-img" src="" alt="Avatar" />
          <div class="av-ph" id="av-ph"></div>
        </div>
        <div class="scan-line"></div>
        <span class="bug-b">DETECTED</span>
        <span class="bug-b">NULL_REF</span>
        <span class="bug-b">400_ERR</span>
        <div class="status-b"><span class="dot"></span>Online · Бишкек</div>
      </div>
    </div>
  </div>
</section>

<div class="mq-sec" id="mq-sec"></div>

<section id="skills">
  <div class="wrap">
    <div class="s-head"><div class="s-label">// навыки</div><h2 class="s-title">Что я умею</h2></div>
    <div class="sk-grid" id="sk-grid"></div>
  </div>
</section>

<section id="about">
  <div class="wrap">
    <div class="ab-in">
      <div class="ab-img-w">
        <div class="ab-img"><div class="ab-ph" id="ab-ph"></div><img class="ab-img-tag" id="ab-img-tag" alt="" /></div>
      </div>
      <div class="ab-text">
        <div class="s-label">// обо мне</div>
        <h2>Обо мне</h2>
        <p class="ab-bio" id="ab-bio"></p>
        <ul class="ab-exp" id="ab-exp"></ul>
        <div class="ab-bars" id="ab-bars"></div>
        <a href="#" class="btn-p" id="cv-link">Перейти к резюме ↓</a>
      </div>
    </div>
  </div>
</section>

<section id="projects">
  <div class="wrap">
    <div class="s-head"><div class="s-label">// портфолио</div><h2 class="s-title">Проекты</h2></div>
    <div class="pf-filters" id="pf-filters"></div>
    <div class="pj-grid" id="pj-grid"></div>
  </div>
</section>

<section id="contact">
  <div class="wrap">
    <div class="ct-in">
      <div class="ct-info">
        <div class="s-label">// написать</div>
        <h2>Связаться<br/>со мной</h2>
        <p id="ct-text"></p>
        <div class="ct-links" id="ct-links"></div>
      </div>
    </div>
  </div>
</section>

<footer>
  <div class="wrap ft-in">
    <a href="#home" class="ft-logo" id="logo-bottom">IN<span>.</span></a>
    <div class="ft-copy" id="ft-copy"></div>
  </div>
</footer>
<button id="backTop" type="button" aria-label="Наверх">↑</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/typed.js/2.1.0/typed.umd.js"></script>
<script src="portfolio.config.js"></script>
<script src="script.js"></script>
</body>
</html>
